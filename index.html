<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Prueba AR - Acta 9 de Julio</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #panel {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      z-index: 999;
      background: rgba(255,255,255,0.92);
      padding: 12px;
      border-radius: 12px;
      color: #111;
      font-size: 15px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #0077cc;
      color: white;
      font-weight: bold;
      margin-top: 6px;
    }

    #estado {
      font-weight: bold;
      color: #b91c1c;
    }
  </style>
</head>

<body>

  <div id="panel">
    <div><strong>AR Acta 9 de Julio</strong></div>
    <div>Estado: <span id="estado">Buscando marcador...</span></div>
    <button onclick="abrirMarcador()">Ver marcador HIRO</button>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-marker preset="hiro" id="marcador">

      <a-box
        position="0 0.5 0"
        rotation="0 45 0"
        color="red"
        depth="1"
        height="1"
        width="1"
        animation="property: rotation; to: 0 405 0; loop: true; dur: 3000">
      </a-box>

      <a-text
        value="ACTA 9 DE JULIO"
        position="-1 1.3 0"
        rotation="-90 0 0"
        color="blue"
        width="4">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marcador = document.querySelector("#marcador");
    const estado = document.querySelector("#estado");

    marcador.addEventListener("markerFound", () => {
      estado.textContent = "Marcador detectado";
      estado.style.color = "green";
    });

    marcador.addEventListener("markerLost", () => {
      estado.textContent = "Buscando marcador...";
      estado.style.color = "#b91c1c";
    });

    function abrirMarcador() {
      window.open("https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png", "_blank");
    }
  </script>

</body>
</html>
