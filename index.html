<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Acta 9 de Julio</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111827;
    }

    .panel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.94);
      color: #111;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.35);
      max-width: 560px;
      margin: auto;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }

    p {
      margin: 6px 0;
      font-size: 15px;
      line-height: 1.35;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      margin: 8px 6px 0 0;
      font-weight: 700;
      cursor: pointer;
      background: #0ea5e9;
      color: white;
    }

    button.secondary {
      background: #334155;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

    <a-marker preset="hiro" smooth="true">

      <a-box 
        position="0 0.03 0" 
        width="1.8" 
        depth="1.25" 
        height="0.06" 
        color="#75AADB">
      </a-box>

      <a-plane 
        position="0 0.11 0" 
        rotation="-90 0 0" 
        width="1.25" 
        height="0.85" 
        color="#f5e6d3">
      </a-plane>

      <a-text
        value="ACTA DE&#10;INDEPENDENCIA&#10;ARGENTINA&#10;9 DE JULIO DE 1816"
        align="center"
        position="0 0.14 0.02"
        rotation="-90 0 0"
        width="2.2"
        color="#2c1810">
      </a-text>

      <a-sphere 
        position="0 0.32 -0.55" 
        radius="0.16" 
        color="#facc15">
      </a-sphere>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <div class="panel">
    <h1>🇦🇷 Realidad Aumentada - Acta 9 de Julio</h1>
    <p><strong>Instrucción:</strong> abrí el marcador HIRO en otra pantalla o imprimilo. Luego apuntá la cámara del celular.</p>

    <p id="info" class="hidden">
      <strong>Fecha:</strong> 9 de Julio de 1816.<br>
      <strong>Lugar:</strong> San Miguel de Tucumán.<br>
      Declaración de independencia de las Provincias Unidas en Sudamérica.
    </p>

    <button onclick="toggleInfo()">📋 Ver información</button>
    <button class="secondary" onclick="openMarker()">🖨️ Ver marcador</button>
  </div>

  <script>
    function toggleInfo() {
      document.getElementById('info').classList.toggle('hidden');
    }

    function openMarker() {
      window.open('https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png', '_blank');
    }
  </script>

</body>
</html>
