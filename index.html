<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Acta 9 de Julio - Cámara AR</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }

    .acta {
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      background: #f5e6d3;
      border: 6px solid #8b5a2b;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      z-index: 2;
      box-shadow: 0 10px 35px rgba(0,0,0,0.65);
    }

    .acta h1 {
      font-size: 24px;
      margin: 0 0 10px;
      color: #2c1810;
    }

    .acta p {
      font-size: 16px;
      color: #111;
    }

    .panel {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 3;
      background: rgba(255,255,255,0.94);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
    }

    button {
      padding: 10px;
      margin: 4px;
      border: none;
      border-radius: 8px;
      background: #0077cc;
      color: white;
      font-weight: bold;
    }

    #estado {
      font-weight: bold;
      color: #b91c1c;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline muted></video>

  <div class="acta">
    <h1>ACTA DE INDEPENDENCIA</h1>
    <h2>🇦🇷 Argentina</h2>
    <p><strong>9 de Julio de 1816</strong></p>
    <p>San Miguel de Tucumán</p>
    <p>Declaración de independencia de las Provincias Unidas en Sudamérica.</p>
  </div>

  <div class="panel">
    <div><strong>Acta 9 de Julio - Realidad Aumentada</strong></div>
    <div>Estado: <span id="estado">Cámara no iniciada</span></div>
    <button onclick="iniciar('trasera')">Cámara trasera</button>
    <button onclick="iniciar('frontal')">Cámara frontal</button>
    <button onclick="iniciar('auto')">Automática</button>
  </div>

  <script>
    let streamActual = null;

    async function iniciar(tipo) {
      const video = document.getElementById("video");
      const estado = document.getElementById("estado");

      if (streamActual) {
        streamActual.getTracks().forEach(track => track.stop());
      }

      let opciones = [];

      if (tipo === "trasera") {
        opciones = [
          { video: { facingMode: { exact: "environment" } }, audio: false },
          { video: { facingMode: "environment" }, audio: false },
          { video: true, audio: false }
        ];
      } else if (tipo === "frontal") {
        opciones = [
          { video: { facingMode: { exact: "user" } }, audio: false },
          { video: { facingMode: "user" }, audio: false },
          { video: true, audio: false }
        ];
      } else {
        opciones = [
          { video: true, audio: false }
        ];
      }

      for (const config of opciones) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia(config);
          streamActual = stream;
          video.srcObject = stream;
          await video.play();

          estado.textContent = "Cámara activa";
          estado.style.color = "green";
          return;
        } catch (error) {
          console.log(error.name, error.message);
          estado.textContent = error.name + ": " + error.message;
          estado.style.color = "#b91c1c";
        }
      }

      alert("No se pudo abrir la cámara. Revisá permisos de Chrome.");
    }

    iniciar("trasera");
  </script>

</body>
</html>
